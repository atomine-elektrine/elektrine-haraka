app = "elektrine-mail"
primary_region = "ord"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  HARAKA_HTTP_HOST = "0.0.0.0"
  HARAKA_HTTP_PORT = "8080"
  ELEKTRINE_QUEUE_NAME = "elektrine:inbound"
  ELEKTRINE_DLQ_NAME = "elektrine:inbound:dlq"
  WEBHOOK_MAX_RETRIES = "5"
  WEBHOOK_RETRY_BASE_MS = "1000"
  REDIS_URL = "redis://127.0.0.1:6379"
  ELEKTRINE_LOCAL_MX_HOST = "127.0.0.1"

[processes]
  app = "/app/scripts/start-fly-stack.sh"

[[mounts]]
  source = "redis_data"
  destination = "/data"
  processes = ["app"]

[[services]]
  processes = ["app"]
  protocol = "tcp"
  internal_port = 25

  [[services.ports]]
    port = 25

[[services]]
  processes = ["app"]
  protocol = "tcp"
  internal_port = 587

  [[services.ports]]
    port = 587

[[services]]
  processes = ["app"]
  protocol = "tcp"
  internal_port = 80

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

[[services]]
  processes = ["app"]
  protocol = "tcp"
  internal_port = 443

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
